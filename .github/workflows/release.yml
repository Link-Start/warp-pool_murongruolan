name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(tr -d '[:space:]' < VERSION)"
          if [ "$tag" != "v$version" ]; then
            echo "tag $tag does not match VERSION $version" >&2
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          commit="${GITHUB_SHA}"
          built="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          out_dir="dist/warppool-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$out_dir"
          go build \
            -trimpath \
            -ldflags "-s -w -X github.com/murongruolan/warp-pool/internal/cli.version=$version -X github.com/murongruolan/warp-pool/internal/cli.commit=$commit -X github.com/murongruolan/warp-pool/internal/cli.date=$built" \
            -o "$out_dir/warppool${{ matrix.ext }}" \
            ./cmd/warppool
          cp README.md VERSION "$out_dir/"
          cp -R assets "$out_dir/assets"

      - name: Archive tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar -czf "warppool-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "warppool-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Archive zip
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          zip -r "warppool-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "warppool-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warppool-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

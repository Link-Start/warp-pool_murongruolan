name: sync-release-notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync, for example v0.1.4. Leave empty to sync all notes."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync release notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG_INPUT: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$TAG_INPUT" ]; then
            notes=".github/release-notes/${TAG_INPUT}.md"
            if [ ! -s "$notes" ]; then
              echo "missing release notes: $notes" >&2
              exit 1
            fi
            gh release edit "$TAG_INPUT" --repo "$REPO" --notes-file "$notes"
            exit 0
          fi

          for notes in .github/release-notes/v*.md; do
            [ -e "$notes" ] || continue
            tag="$(basename "$notes" .md)"
            if gh release view "$tag" --repo "$REPO" >/dev/null 2>&1; then
              gh release edit "$tag" --repo "$REPO" --notes-file "$notes"
            else
              echo "skip missing release: $tag"
            fi
          done

